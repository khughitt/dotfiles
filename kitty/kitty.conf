#font_family      Fira Code Regular Nerd Font Complete

# fira/fura gaps bug (2023)
# https://github.com/tonsky/FiraCode/issues/1081
#font_family      Fura Code Regular Nerd Font Complete Mono
#font_family      JetBrains Mono Regular Nerd Font Complete Mono
# bold_font        JetBrains Mono Bold Nerd Font Complete Mono

font_family       Fira Code Retina Nerd Font Complete
font_features     FiraCode-Retina +ss02 +ss03 +ss04 +ss05 +zero
bold_font         JetBrains Mono Bold Nerd Font Complete Mono 
bold_italic_font  Source Code Pro Bold Italic
italic_font       Source Code Pro Italic

# scrolling
scrollbar scrolled
scrollback_lines 8192
scrollback_pager moor

allow_remote_control yes
listen_on unix:@dotfiles-kitty
background_opacity 1.0
cursor_stop_blinking_after 0.0
default_pointer_shape arrow
dynamic_background_opacity yes
enable_audio_bell no
paste_actions confirm-if-large
strip_trailing_spaces smart
window_padding_width 4

# tmux clipboard support
clipboard_control write-primary write-clipboard no-append

# keyboard mappings
map shift+insert      paste_from_selection
map ctrl+shift+v      paste_from_clipboard

# fix shift-backspace
map shift+backspace   send_text all \b

# claude code (https://github.com/anthropics/claude-code/issues/3853)
map shift+enter       send_text all \n

# navigate between claude code / codex-cli user prompts
# map alt+up            kitten scroll_prompt.py prev
# map alt+down          kitten scroll_prompt.py next
map alt+up   combine : toggle_marker regex 1 [❯›] : scroll_to_mark prev 1 : toggle_marker regex 1 [❯›]
map alt+down combine : toggle_marker regex 1 [❯›] : scroll_to_mark next 1 : toggle_marker regex 1 [❯›]

# semantic per-window project overrides
# temporary override (clears when project changes)
map alt+0 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override reset --window-id=${KITTY_WINDOW_ID}
map alt+1 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/solarized-light.conf
map alt+2 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/catppuccin-latte.conf
map alt+3 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/rose-pine-dawn.conf
map alt+4 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/github-light.conf
map alt+5 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/gruvbox-light.conf
map alt+6 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/everforest-light.conf
map alt+7 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/atom-one-light.conf
map alt+8 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/ayu-light.conf
map alt+9 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=temporary --theme=manual/papercolor-light.conf

# sticky override (persists until reset)
map ctrl+alt+1 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/solarized-light.conf
map ctrl+alt+2 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/catppuccin-latte.conf
map ctrl+alt+3 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/rose-pine-dawn.conf
map ctrl+alt+4 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/github-light.conf
map ctrl+alt+5 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/gruvbox-light.conf
map ctrl+alt+6 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/everforest-light.conf
map ctrl+alt+7 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/atom-one-light.conf
map ctrl+alt+8 launch --type=background --cwd=current ${HOME}/.dotfiles/bin/kitty-theme override set --window-id=${KITTY_WINDOW_ID} --mode=sticky --theme=manual/ayu-light.conf
