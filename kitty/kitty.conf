#font_family      Fira Code Regular Nerd Font Complete

# fira/fura gaps bug (2023)
# https://github.com/tonsky/FiraCode/issues/1081
#font_family      Fura Code Regular Nerd Font Complete Mono
#font_family      JetBrains Mono Regular Nerd Font Complete Mono
# bold_font        JetBrains Mono Bold Nerd Font Complete Mono

font_family       Fira Code Retina Nerd Font Complete
font_features     FiraCode-Retina +ss02 +ss03 +ss04 +ss05 +zero
bold_font         JetBrains Mono Bold Nerd Font Complete Mono 
bold_italic_font  Source Code Pro Bold Italic
italic_font       Source Code Pro Italic

# scrolling
scrollbar scrolled
scrollback_lines 8192
scrollback_pager moor

allow_remote_control yes
background_opacity 1.0
cursor_stop_blinking_after 0.0
default_pointer_shape arrow
dynamic_background_opacity yes
enable_audio_bell no
paste_actions confirm-if-large
strip_trailing_spaces smart
window_padding_width 4

# tmux clipboard support
clipboard_control write-primary write-clipboard no-append

# keyboard mappings
map shift+insert      paste_from_selection
map ctrl+shift+v      paste_from_clipboard

# fix shift-backspace
map shift+backspace   send_text all \b

# claude code (https://github.com/anthropics/claude-code/issues/3853)
map shift+enter       send_text all \n

# navigate between claude code / codex-cli user prompts
# map alt+up            kitten scroll_prompt.py prev
# map alt+down          kitten scroll_prompt.py next
map alt+up   combine : toggle_marker regex 1 [❯›] : scroll_to_mark prev 1 : toggle_marker regex 1 [❯›]
map alt+down combine : toggle_marker regex 1 [❯›] : scroll_to_mark next 1 : toggle_marker regex 1 [❯›]

# per-window project color overrides (light themes)
map alt+0 remote_control set-colors themes/noctalia.conf
map alt+1 remote_control set-colors themes/manual/solarized-light.conf
map alt+2 remote_control set-colors themes/manual/catppuccin-latte.conf
map alt+3 remote_control set-colors themes/manual/rose-pine-dawn.conf
map alt+4 remote_control set-colors themes/manual/github-light.conf
map alt+5 remote_control set-colors themes/manual/gruvbox-light.conf
map alt+6 remote_control set-colors themes/manual/everforest-light.conf
map alt+7 remote_control set-colors themes/manual/atom-one-light.conf
map alt+8 remote_control set-colors themes/manual/ayu-light.conf
map alt+9 remote_control set-colors themes/manual/papercolor-light.conf

# external configs
#include ${HOME}/.cache/wal/colors-kitty.conf
include themes/noctalia.conf
include ${HOSTNAME}.conf

# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
