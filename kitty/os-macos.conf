# macOS-only kitty overrides.
# Symlinked to os-local.conf by setup.sh and pulled in via `include os-local.conf`.

# Fonts: brew nerd-font casks (font-fira-code-nerd-font, font-jetbrains-mono-nerd-font,
# font-sauce-code-pro-nerd-font) use the modern short names, not the old
# "... Nerd Font Complete" names in the shared config.
font_family       FiraCode Nerd Font Ret
font_features     FiraCodeNF-Ret +ss02 +ss03 +ss04 +ss05 +zero
bold_font         JetBrainsMono NFM Bold
italic_font       SauceCodePro NF Italic
bold_italic_font  SauceCodePro NF Bold Italic

# Slight background transparency (the compositor handles this on Linux/niri,
# so it lives here rather than in the shared config).
background_opacity 0.95

# remote-control socket: macOS lacks abstract unix sockets, so use a
# filesystem path (kitty appends the pid to keep instances distinct)
listen_on unix:${TEMP}/dotfiles-kitty
