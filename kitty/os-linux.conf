# Linux-only kitty overrides.
# Symlinked to os-local.conf by setup.sh and pulled in via `include os-local.conf`.

# remote-control socket (abstract unix sockets are Linux-only)
listen_on unix:@dotfiles-kitty

# Background transparency is handled by the Wayland compositor (niri), so
# background_opacity stays at the shared default of 1.0.
