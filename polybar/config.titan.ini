[colors]
background = "#bb333333"
background-alt = ${xrdb:color0:#222}
foreground = ${xrdb:color7:#ddd}
foreground-alt = ${xrdb:color8:#888}
primary = ${xrdb:color4:#569cd6}
secondary = ${xrdb:color6:#4ec9b0}
alert = ${xrdb:color1:#f44747}
accent1 = ${xrdb:color5:#c678dd}
accent2 = ${xrdb:color2:#98c379}

[bar/bar]
background = ${colors.background}
foreground = ${colors.foreground}

monitor = ${env:MONITOR:}
width = 100%
height = 30
radius = 0
fixed-center = false

line-size = 3
line-color = #f00
border-size = 0
border-color = #222222

padding-left = 1
padding-right = 1

module-margin-left = 0
module-margin-right = 1

; https://github.com/polybar/polybar/wiki/Fonts
font-0 = FiraMono Nerd Font:size=10;2
font-1 = Siji:pixelsize=10;1

modules-left = i3
modules-right = pulseaudio memory cpu cursor-mcp polypomo layout_mode date tray

[module/tray]
type = internal/tray
cursor-click = pointer
cursor-scroll = ns-resize
tray-padding = 2
wm-restack = i3

[module/snakemake-isrunning]
type = custom/script
exec = ~/.config/polybar/scripts/snakemake-isrunning.sh
interval = 120
format-underline = ${xrdb:color7}

[module/cursor-mcp]
type = custom/script
exec = cat /tmp/polybar-mcp-message 2>/dev/null | jq -r '.message // ""' 2>/dev/null || echo ".."
interval = 2
format = <label>
format-prefix = "%{T2}ÓÄŹ%{T-} "
format-prefix-foreground = ${colors.accent1}
format-underline = ${colors.accent1}
label = %output%

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

strip-wsnumbers = true

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-padding = 1
label-mode-foreground = ${colors.background}
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.secondary}
label-focused-foreground = ${colors.secondary}
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %name%
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 1

; visible = Active workspace on unfocused monitor
label-visible = %name%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${colors.primary}
label-visible-foreground = ${colors.primary}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

; Separator in between workspaces
; label-separator = |
;format-prefix = "ÓÄ¶ "

[module/polypomo]
type = custom/script

exec = ~/.config/polybar/scripts/polypomo | sed -u 's/[‚Źł‚ŹĮ‚ŹĻūüćÖ]//'
tail = true

format = <label>
format-prefix = "%{T2}ÓÄě%{T-} "
format-prefix-foreground = ${colors.accent1}
format-underline = ${colors.accent1}
label = %output%
click-left = ~/.config/polybar/scripts/polypomo toggle
click-right = ~/.config/polybar/scripts/polypomo end
click-middle = ~/.config/polybar/scripts/polypomo lock
scroll-up = ~/.config/polybar/scripts/polypomo time +60
scroll-down = ~/.config/polybar/scripts/polypomo time -60

[module/cpu]
type = internal/cpu
interval = 3
; format-prefix = "%{T5}Ôčõ %{T-}"
format = <label>
format-prefix = "%{T2}ÓÄ¶%{T-} "
format-prefix-foreground = ${colors.primary}
format-underline = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format = <label>
format-prefix = "%{T2}ÓÄ°%{T-} "
format-prefix-foreground = ${colors.secondary}
format-underline = ${colors.secondary}
format-warn = <label-warn>
format-warn-prefix = "%{T2}ÓÄ° %{T-}"
format-warn-prefix-foreground = ${colors.alert}
format-warn-underline = ${colors.alert}
label = %percentage_used%%
label-warn = %percentage_used%%
warn-percentage = 80
;format-prefix = "ÓÄ® "
;format-warn-prefix = "ÓÄ® "

[module/date]
type = internal/date
interval = 5
date =
date-alt = " %Y-%m-%d"
time = "%I:%M %p"
time-alt = "%I:%M:%S %p"
; format-prefix = ÓÄĖ
format = <label>
format-prefix = "%{T2}ÓÄē%{T-} "
format-prefix-foreground = ${colors.primary}
format-underline = ${colors.primary}
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio
sink = jack_out
click-right = "pavucontrol &"
click-middle = pactl set-sink-mute @DEFAULT_SINK@ toggle
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +5%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -5%
format-volume = <label-volume>
format-volume-prefix = "%{T2}ÓĀĚ%{T-} "
format-volume-prefix-foreground = ${colors.accent1}
label-volume = %percentage%%
label-volume-foreground = ${root.foreground}
format-volume-underline = ${colors.accent1}
format-muted = <label-muted>
format-muted-prefix = "%{T2}ÓĀŹ%{T-} "
format-muted-prefix-foreground = ${colors.foreground-alt}
format-muted-underline = ${colors.foreground-alt}
label-muted = muted
label-muted-foreground = ${colors.foreground-alt}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60
format = <ramp> <label>
format-underline = #f50a4d
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}
ramp-0 = ÓÉČ
ramp-1 = ÓÉä
ramp-2 = ÓÉč
ramp-foreground = ${colors.foreground-alt}

#[module/weather]
#type = custom/script
#exec = ~/.config/polybar/modules/forecast/polybar-forecast
#exec-if = ping openweathermap.org -c 1
#interval = 600
#label-font = 3
#format-underline = ${xrdb:color6}

#
# layout indicator
# source: https://www.reddit.com/r/i3wm/comments/kf0dpa/visual_indication_of_i3_workspace_layout/gg6xvg8?utm_source=share&utm_medium=web2x&context=3
#
# minimum latency is 1 second, unless you set this to 0 and handle polling
# in an external script
#
[module/layout_mode]
type = custom/script
exec = i3-msg -t get_tree | jq -r 'recurse(.nodes[];.nodes!=null)|select(.nodes[].focused).layout'
interval = 5
format = <label>
format-prefix = "%{T2}ÓÄā%{T-} "
format-prefix-foreground = ${colors.primary}
format-underline = ${colors.primary}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini
