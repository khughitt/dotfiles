# host-europa.conf — europa (Dell XPS 13, FHD+ 1920x1200, Intel Iris Xe)

# GPU: Intel Iris Xe (Mesa) — no nvidia env vars needed

# External monitor: use as primary, disable internal display
# When unplugged, the handler re-enables eDP-1 automatically
exec-once = ~/.config/hypr/scripts/monitor-handler.sh

# FHD+ 13.4": tighter spacing to preserve screen real estate
general {
    gaps_in = 3
    gaps_out = 6
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 1   # lighter = better battery
        vibrancy = 0.1696
    }
}

# Lid close: lock & suspend when not docked
bindl = , switch:on:Lid Switch, exec, hyprlock
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

# Touchpad: natural scroll for laptop
input {
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}
