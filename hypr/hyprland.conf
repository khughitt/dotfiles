# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf
debug:disable_logs = false

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
#$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Export environment variables for D-Bus and display (needed for notify-send, MCP servers, etc.)
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY DBUS_SESSION_BUS_ADDRESS
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY DBUS_SESSION_BUS_ADDRESS

# Status bar (hostname-aware: desktop vs laptop config)
exec-once = ~/.config/waybar/launch.sh

# Wallpaper daemon (swww)
exec-once = swww-daemon

# Primary / clipboard persistence
#exec-once = wl-clip-persist --clipboard both
exec-once = wl-clip-persist --clipboard regular


# Restore last wallpaper (pywal)
exec-once = ~/.config/hypr/scripts/restore-wallpaper.sh

# Notification daemon (mako with pywal colors)
exec-once = mako --config ~/.cache/wal/config-mako

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = hyprpaper & firefox

# Scratchpad terminals (similar to i3 config)

# REPL scratchpads - Alt+modifier
exec-once = [workspace special:kitty_scratch silent] kitty
exec-once = [workspace special:r_scratch silent] kitty radian
exec-once = [workspace special:python_scratch silent] kitty ipython
# exec-once = [workspace special:haskell_scratch silent] kitty ghci
# exec-once = [workspace special:julia_scratch silent] kitty julia
# exec-once = [workspace special:node_scratch silent] kitty node


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# nvidia support
# https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 12
    gaps_out = 12

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
    # layout = master  # Alternative: equal columns with center orientation
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 14
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 2
        vibrancy = 0.1696
        noise = 0.0351
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
# master {
#     new_status = slave          # New windows become slaves (not master)
#     orientation = center        # Master in center, slaves on sides
#     mfact = 0.33                # Master width ~33% (equal thirds with 2 slaves)
# }

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
# Terminal - opens new instance each time
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,  # Alternative kill binding like i3
bind = $mainMod SHIFT, E, exit,
bind = $mainMod SHIFT, C, exec, hyprctl reload,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Space, togglefloating,
bind = CONTROL, Space, exec, $menu
bind = $mainMod, F, fullscreen, 0

# Vim-style focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Vim-style window movement
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Move windows with arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Layout controls (note: Hyprland uses master/dwindle, not i3-style stacking/tabbed)
bind = $mainMod, S, togglegroup,  # closest to stacking
bind = $mainMod, W, changegroupactive, f  # closest to tabbed navigation
# bind = $mainMod, A, focusparent,  # Not available in Hyprland (i3-specific)

# Split controls (dwindle)
bind = $mainMod, B, togglesplit,
bind = $mainMod, V, togglesplit,

# Master layout controls (uncomment if using master layout)
# bind = $mainMod, Space, layoutmsg, swapwithmaster       # Swap focused with master
# bind = $mainMod, O, layoutmsg, orientationcycle left center  # Cycle orientation

# Screenshot (using grim for Wayland)
bind = , F6, exec, grim
bind = $mainMod, F6, exec, grim -g "$(slurp)"

# Rofi scripts
bind = $mainMod, M, exec, rofi -show mindmaps -modi "mindmaps:$DOTFILES/rofi/scripts/rofi-mindmaps.sh"
bind = $mainMod, P, exec, rofi -show proj -modi "proj:~/d/software/rofi-proj/rofi-proj.py"

# Wallpaper switcher
bind = $mainMod, N, exec, wali

# Scratchpad terminals (using Alt modifier like i3 config)
bind = ALT, Return, togglespecialworkspace, kitty_scratch
bind = ALT, Space, togglespecialworkspace, r_scratch
bind = ALT, P, togglespecialworkspace, python_scratch
bind = ALT, H, togglespecialworkspace, haskell_scratch
bind = ALT, J, togglespecialworkspace, julia_scratch
bind = ALT, N, togglespecialworkspace, node_scratch

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Clipboard keybindings
# Middle mouse paste (from primary selection)
# bind = , mouse:274, exec, wl-paste --primary | wl-copy

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-sink-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Resize mode (Mod+Shift+R)
bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# notify-mcp
submap = mcp
bind = ,Escape,exec,~/.config/waybar/scripts/waybar-mcp-clear.sh
submap = reset

exec-once = node ~/d/software/ohai/bin/ohai-mcp
exec-once = qs -p ~/d/software/ohai/ohai/shell.qml


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Floating windows (similar to i3 config)
windowrule = match:class ^(text-input)$, float on
windowrule = match:class ^(peek)$, float on

# Scratchpad window rules (ensure they float and are centered)
windowrule = match:workspace special:i3term, float on
windowrule = match:workspace special:i3term, center on
windowrule = match:workspace special:i3term, size 80% 80%

# Kitty terminal: dim when inactive
windowrule = match:class kitty, opacity 0.97 0.7

# No blur for certain apps
windowrule = match:class ^(gimp)$, no_blur on
windowrule = match:class ^([Bb]rave)$, no_blur on
windowrule = match:class ^([Ff]irefox)$, no_blur on
windowrule = match:class ^(firefoxdeveloperedition)$, no_blur on
windowrule = match:class ^(Nightly)$, no_blur on

# Bitwig work-around
# https://www.reddit.com/r/Bitwig/comments/1jaqgd2/does_anyone_use_bitwig_using_hyprland_on_arch/
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus on
